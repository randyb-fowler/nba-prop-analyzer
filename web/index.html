<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Prop Analyzer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div id="account" class="account"></div>
    <h1>🏀 NBA Prop Analyzer</h1>
    <p class="tagline">Hit rates, splits, venues &amp; injuries — powered by live NBA data</p>
  </header>

  <main>
    <section id="slate" class="card slate">
      <div class="slate-head">
        <h2>🗓️ NBA Slate</h2>
        <input id="slate-date" type="date" title="Pick a date">
      </div>
      <div id="slate-games" class="slate-games">Loading games…</div>
    </section>

    <form id="prop-form" class="card">
      <div class="row">
        <div class="field">
          <label for="player">Player</label>
          <input id="player" name="player" list="player-list" placeholder="LeBron James" autocomplete="off" required>
          <datalist id="player-list"></datalist>
        </div>
        <div class="field">
          <label for="player-b">Compare vs (optional)</label>
          <input id="player-b" name="player-b" list="player-list-b" placeholder="Stephen Curry" autocomplete="off">
          <datalist id="player-list-b"></datalist>
        </div>
      </div>

      <div class="row">
        <div class="field small">
          <label for="stat">Stat</label>
          <select id="stat" name="stat"></select>
        </div>
        <div class="field small">
          <label for="line">Line</label>
          <input id="line" name="line" type="number" step="0.5" placeholder="auto / 24.5">
        </div>
        <div class="field small">
          <label for="over">Bet</label>
          <select id="over" name="over">
            <option value="true">Over</option>
            <option value="false">Under</option>
          </select>
        </div>
        <div class="field small">
          <label for="opponent">Opponent (optional)</label>
          <select id="opponent" name="opponent">
            <option value="">Any</option>
          </select>
        </div>
        <div class="field small">
          <label for="season">Season</label>
          <select id="season" name="season"></select>
        </div>
        <button type="submit">Analyze</button>
      </div>
    </form>

    <div id="gate-note" class="gate-note"></div>
    <div id="status" class="status"></div>
    <section id="results" class="hidden"></section>
  </main>

  <footer class="credit">
    <p>Built by <a href="https://github.com/randyb-fowler" target="_blank" rel="noopener">Randy Fowler</a> · <a href="https://github.com/randyb-fowler" target="_blank" rel="noopener">GitHub</a> · <a href="https://www.linkedin.com/in/randy-fowler-3ab1a4294/" target="_blank" rel="noopener">LinkedIn</a></p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
