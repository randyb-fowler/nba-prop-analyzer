# Render Blueprint — deploys the NBA Prop Analyzer on Render's free tier.
# In Render: New + → "Blueprint" → connect this repo → it reads this file.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: nba-prop-analyzer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    envVars:
      # Render's Python 3.14 support lags; pin to a well-supported version
      # that has prebuilt numpy/pandas wheels.
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Public URL — must match Google OAuth redirect + Stripe return URLs.
      - key: APP_BASE_URL
        value: "https://nba-prop-analyzer-w19a.onrender.com"
      # Session signing key — Render generates a strong random value.
      - key: SECRET_KEY
        generateValue: true
      # Secrets — set these in the Render dashboard (Environment tab), NOT here.
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ODDS_API_KEY
        sync: false
